baseURL: https://scurrra.github.io/yacp-diaries/
locale: en-us
title: Yet Another Competitive Programming Journey

module:
  imports:
    - path: github.com/imfing/hextra

security:
  http:
    urls:
      - '^https?://cdn\.jsdelivr\.net/.*'
      - "^https?://[a-z]"
      - "! (?i)localhost"

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: DSA Book
      weight: 2
      url: "https://scurrra.github.io/atl/book"
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/Scurrra/yacp-diaries"
      params:
        icon: github

params:
  # Display the last modification date
  displayUpdatedDate: false # it's broken
  dateFormat: "May 1, 2006"
  enableGitInfo: true
